api_keys:
  llm_model: "YOUR_LLM_MODEL_API_KEY"
  reward_model: "YOUR_REWARD_MODEL_API_KEY"
  embedding_model: "YOUR_EMBEDDING_MODEL_API_KEY"
  chat_model: "YOUR_CHAT_MODEL_API_KEY"

models:
  llm_model: "nvidia/llama-3.3-nemotron-super-49b-v1"
  reward_model: "nvidia/llama-3.1-nemotron-70b-reward"
  embedding_model: "nvidia/nv-embed-v1"
  chat_model: "qwen/qwen3-next-80b-a3b-instruct"

model_url:
  llm_model: "https://integrate.api.nvidia.com/v1"
  reward_model: "https://integrate.api.nvidia.com/v1"
  embedding_model: "https://integrate.api.nvidia.com/v1"
  chat_model: "https://integrate.api.nvidia.com/v1"

paths:
  data_dir: "src/data/pdf"
  db_dir: "src/data/chroma_db"

hyperparameters:
  temperature: 0.6
  top_p: 0.95
  max_tokens: 4096
  chunk_size: 800
  chunk_overlap: 80